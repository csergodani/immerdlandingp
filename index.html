<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmerDrive Iframe Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container flex-header">
            <h1 class="logo">IMMER<span>DRIVE</span> TESTER</h1>
            <div class="url-control">
                <input type="text" id="showroom-url" placeholder="Másold be a showroom linket..." value="">
                <button id="load-btn">BETÖLTÉS</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="status-badge" id="status-badge">Várakozás linkre...</div>

        <section class="showroom-container">
            <div class="iframe-wrapper">
                <iframe 
                    id="immerdrive-iframe"
                    src="about:blank" 
                    title="ImmerDrive 3D Showroom"
                    frameborder="0"
                    allowfullscreen
                ></iframe>
            </div>
        </section>

        <section class="log-section">
            <div class="log-header">
                <h3>RENDSZERNAPLÓ (ERROR LOG)</h3>
                <button id="download-log" class="small-btn">Log letöltése (.txt)</button>
            </div>
            <div id="error-log" class="console">
                <p class="msg-info">[System] Indításra kész...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
